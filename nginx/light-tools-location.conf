# Put this file inside the existing `server { ... }` block for herong.info.
#
# The Next.js app is built with:
#   NEXT_PUBLIC_BASE_PATH=/file-tools
#   NEXT_PUBLIC_SITE_URL=http://herong.info/file-tools
#
# It listens on 127.0.0.1:3001 via light-tools/docker-compose.prod.yml.

location = /file-tools {
  client_max_body_size 60m;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 180s;
  proxy_send_timeout 180s;
  proxy_pass http://127.0.0.1:3001;
}

location ^~ /file-tools/ {
  client_max_body_size 60m;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 180s;
  proxy_send_timeout 180s;
  proxy_pass http://127.0.0.1:3001;
}
